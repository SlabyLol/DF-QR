<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DF-QR Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --primary: #6366f1; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .container { background-color: var(--card); padding: 2rem; border-radius: 1rem; box-shadow: 0 10px 25px rgba(0,0,0,0.3); width: 100%; max-width: 400px; text-align: center; }
        h1 { margin-bottom: 1.5rem; color: var(--primary); }
        select, input { width: 100%; padding: 12px; margin-bottom: 1rem; border-radius: 0.5rem; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        .btn-group { display: flex; gap: 10px; margin-bottom: 1rem; }
        button { flex: 1; padding: 12px; border: none; border-radius: 0.5rem; cursor: pointer; font-weight: bold; transition: 0.3s; color: white; }
        .btn-gen { background-color: var(--primary); }
        .btn-scan { background-color: #10b981; }
        #reader { width: 100%; border-radius: 0.5rem; overflow: hidden; margin-top: 1rem; }
        #scanResult { margin-top: 1rem; padding: 10px; border: 1px solid #334155; border-radius: 5px; word-break: break-all; display: none; background: #0f172a; }
        #qrcode { margin-top: 2rem; display: flex; justify-content: center; }
    </style>
</head>
<body>

<div class="container">
    <h1>DF-QR</h1>
    <select id="type" onchange="toggleInput()">
        <option value="link">Link</option>
        <option value="text">Text</option>
        <option value="video">Video (Link/Upload)</option>
        <option value="image">Image (Link/Upload)</option>
    </select>
    
    <div id="input-container">
        <input type="text" id="content" placeholder="Enter content...">
    </div>

    <label style="display:block; margin-bottom: 5px; text-align: left;">QR Color:</label>
    <input type="color" id="colorPicker" value="#ffffff" style="height: 40px; cursor: pointer;">

    <div class="btn-group">
        <button class="btn-gen" onclick="generateQR()">Generate</button>
        <button class="btn-scan" onclick="startCameraScan()">Scan QR</button>
    </div>
    
    <div id="reader"></div>
    <div id="scanResult"></div>
    <div id="qrcode"></div>
</div>

<script>
    let html5QrCode;

    function toggleInput() {
        const type = document.getElementById('type').value;
        const container = document.getElementById('input-container');
        if (type === 'video' || type === 'image') {
            container.innerHTML = `
                <select id="mode" onchange="updateMode()">
                    <option value="link">Paste Link</option>
                    <option value="file">Upload File</option>
                </select>
                <input type="text" id="content" placeholder="Paste URL...">
            `;
        } else {
            container.innerHTML = `<input type="text" id="content" placeholder="Enter content...">`;
        }
    }

    function updateMode() {
        const mode = document.getElementById('mode').value;
        const container = document.getElementById('input-container');
        if (mode === 'file') {
            container.querySelector('input').outerHTML = `<input type="file" id="fileInput">`;
        } else {
            container.querySelector('input').outerHTML = `<input type="text" id="content" placeholder="Paste URL...">`;
        }
    }

    async function startCameraScan() {
        document.getElementById('scanResult').style.display = "none";
        document.getElementById('qrcode').innerHTML = "";
        
        // Stoppe vorherigen Scan, falls aktiv
        if (html5QrCode) {
            try { await html5QrCode.stop(); } catch(e) {}
        }

        html5QrCode = new Html5Qrcode("reader");
        
        // Verbesserte Konfiguration
        const config = { fps: 15, qrbox: { width: 250, height: 250 } };
        
        html5QrCode.start(
            { facingMode: "environment" }, 
            config,
            (decodedText) => {
                document.getElementById('scanResult').style.display = "block";
                document.getElementById('scanResult').innerText = "Result: " + decodedText;
                html5QrCode.stop();
            },
            (errorMessage) => {
                // Scanning (keine logs hier, um das UI sauber zu halten)
            }
        ).catch(err => {
            alert("Fehler: Kamera konnte nicht gestartet werden. Bitte erlaube den Zugriff.");
        });
    }

    function generateQR() {
        if(html5QrCode && html5QrCode.isScanning) html5QrCode.stop();
        
        const qrcodeDiv = document.getElementById('qrcode');
        const color = document.getElementById('colorPicker').value;
        const data = document.getElementById('content').value;

        if(!data) return alert("Please enter content.");
        
        qrcodeDiv.innerHTML = "";
        new QRCode(qrcodeDiv, {
            text: data,
            width: 256,
            height: 256,
            colorDark : color,
            colorLight : "#0f172a",
            correctLevel : QRCode.CorrectLevel.H
        });
    }
</script>

</body>
</html>
